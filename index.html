<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Display</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0; /* Light gray background to show off transparency */
            padding: 40px 20px;
            margin: 0;
        }

        .logo-container {
            margin: 20px;
            padding: 20px;
            background-color: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo-container img {
            max-width: 300px; 
            width: 100%; /* Ensures images scale down on smaller screens */
            height: auto;
        }

        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <!-- Battlehard Logo Section -->
    <div class="logo-container">
        <h2>Esports Logo</h2>
        <!-- Replaced with image.png as requested -->
        <img src="image.png" alt="BATTLEHARD Esports Logo">
    </div>

    <!-- Union 42 Logo Section -->
    <div class="logo-container">
        <h2>Club Logo</h2>
        <!-- Replaced with image_2.png as requested -->
        <img src="image_2.png" alt="Bourbon & Brew Juice Club Member Logo">
    </div>

</body>
</html>
